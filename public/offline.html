<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Dock Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f6f1e8;
        color: #1c1917;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(520px, calc(100vw - 32px));
        padding: 24px;
        border-radius: 28px;
        background: white;
        border: 1px solid #e7dccb;
        box-shadow: 0 18px 60px rgba(92, 74, 54, 0.11);
      }
      h1 { margin-top: 0; }
      p { color: #73695f; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <h1>Family Dock is offline</h1>
      <p>Your device is not connected. Reconnect and refresh to sync schedules, homework and reminders.</p>
    </main>
  </body>
</html>
